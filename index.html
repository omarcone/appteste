<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Hardware Master</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030305; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: #4f46e5; transition: 0.3s; }
        .btn-primary:hover { background: #4338ca; transform: scale(1.02); }
        video { width: 100%; border-radius: 12px; display: none; margin-top: 10px; border: 2px solid #4f46e5; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-white">App Pro <span class="text-indigo-500 text-sm">v2.0</span></h1>
            <p class="text-gray-400">Integração Nativa Android via Javascript</p>
        </header>

        <div class="space-y-6">
            <div class="card p-6 rounded-2xl">
                <h3 class="text-lg font-bold mb-2">📍 Localização GPS</h3>
                <button onclick="getGPS()" class="btn-primary w-full py-3 rounded-lg font-bold">Aceder GPS</button>
                <p id="gps-out" class="mt-2 text-xs text-indigo-300"></p>
            </div>

            <div class="card p-6 rounded-2xl">
                <h3 class="text-lg font-bold mb-2">📸 Câmera Nativa</h3>
                <button onclick="openCam()" class="btn-primary w-full py-3 rounded-lg font-bold">Ativar Lente</button>
                <video id="vid" autoplay playsinline></video>
            </div>

            <div class="card p-6 rounded-2xl">
                <h3 class="text-lg font-bold mb-2">🔔 Notificações Push</h3>
                <button onclick="notify()" class="btn-primary w-full py-3 rounded-lg font-bold">Testar Alerta</button>
            </div>
        </div>

        <footer class="mt-20 text-center opacity-30 text-xs">
            Bubblewrap Master Engine © 2026
        </footer>
    </div>

    <script>
        // GPS de Alta Precisão
        function getGPS() {
            const out = document.getElementById('gps-out');
            navigator.geolocation.getCurrentPosition(p => {
                out.innerText = `Lat: ${p.coords.latitude} | Lon: ${p.coords.longitude}`;
            }, e => alert("Erro no GPS"), { enableHighAccuracy: true });
        }

        // Câmera
        async function openCam() {
            const v = document.getElementById('vid');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                v.srcObject = s;
                v.style.display = 'block';
            } catch (e) { alert("Câmera bloqueada"); }
        }

        // Notificações
        function notify() {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') {
                    new Notification("App Pro", { body: "Hardware integrado com sucesso!", icon: "https://cdn-icons-png.flaticon.com/512/15/15818.png" });
                }
            });
        }

        // Service Worker (Obrigatório para ser instalável)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
